rules:
  - id: python-ssrf-urllib
    patterns:
      - pattern-either:
          - pattern: urllib.request.urlopen($URL, ...)
          - pattern: urllib.request.Request($URL, ...)
      - pattern-not: urllib.request.urlopen("...", ...)
      - pattern-not: urllib.request.Request("...", ...)
    message: Potential SSRF via urllib
    languages: [python]
    severity: ERROR

  - id: python-ssrf-httpx
    patterns:
      - pattern-either:
          - pattern: httpx.get($URL, ...)
          - pattern: httpx.post($URL, ...)
          - pattern: httpx.put($URL, ...)
          - pattern: httpx.delete($URL, ...)
          - pattern: httpx.patch($URL, ...)
          - pattern: httpx.request($METHOD, $URL, ...)
          - pattern: httpx.Client().get($URL, ...)
          - pattern: httpx.AsyncClient().get($URL, ...)
      - pattern-not: httpx.get("...", ...)
      - pattern-not: httpx.post("...", ...)
      - pattern-not: httpx.put("...", ...)
      - pattern-not: httpx.delete("...", ...)
      - pattern-not: httpx.patch("...", ...)
      - pattern-not: httpx.request($METHOD, "...", ...)
      - pattern-not: httpx.Client().get("...", ...)
      - pattern-not: httpx.AsyncClient().get("...", ...)
    message: Potential SSRF via httpx
    languages: [python]
    severity: ERROR

  - id: python-ssrf-aiohttp
    patterns:
      - pattern-either:
          - patterns:
              - pattern: $SESSION.get($URL, ...)
              - pattern-inside: |
                  async with aiohttp.ClientSession(...) as $SESSION:
                    ...
          - patterns:
              - pattern: $SESSION.post($URL, ...)
              - pattern-inside: |
                  async with aiohttp.ClientSession(...) as $SESSION:
                    ...
          - pattern: aiohttp.request($METHOD, $URL, ...)
      - pattern-not: $SESSION.get("...", ...)
      - pattern-not: $SESSION.post("...", ...)
      - pattern-not: aiohttp.request($METHOD, "...", ...)
    message: Potential SSRF via aiohttp
    languages: [python]
    severity: ERROR
